<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPAY NGO — Finance Portal Login</title>
  <meta name="description" content="Secure login to the UPAY NGO Finance Portal for Admins and Volunteers." />
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1E1B4B 0%, #312E81 40%, #1e3a5f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--primary-light);
      top: -150px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent);
      bottom: -120px; left: -80px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: var(--radius-xl);
      box-shadow: 0 30px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
      width: 100%;
      max-width: 440px;
      padding: 44px 40px 36px;
      position: relative;
      z-index: 1;
      animation: slideUpModal 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .login-logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(79,70,229,0.4);
    }

    .login-logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1.1;
    }

    .login-logo-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .login-heading {
      margin-bottom: 6px;
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-option {
      position: relative;
    }

    .role-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .role-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface-2);
    }

    .role-label:hover {
      border-color: var(--primary-light);
      background: #EEF2FF;
    }

    .role-option input:checked + .role-label {
      border-color: var(--primary);
      background: #EEF2FF;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }

    .role-emoji { font-size: 20px; }

    .role-label-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .role-label-text small {
      font-size: 11px;
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all var(--transition);
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(79,70,229,0.4);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79,70,229,0.45);
    }

    .login-btn:active { transform: translateY(0); }

    .login-error {
      display: none;
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
      text-align: center;
    }

    .login-error.show { display: block; }

    .demo-creds {
      margin-top: 24px;
      padding: 16px;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: var(--radius);
    }

    .demo-creds h4 {
      font-size: 12px;
      font-weight: 700;
      color: #065F46;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cred-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .cred-row:last-child { margin-bottom: 0; }

    .cred-role {
      font-weight: 700;
      color: var(--text-primary);
      min-width: 70px;
    }

    .cred-email {
      color: var(--text-secondary);
      flex: 1;
      text-align: center;
    }

    .cred-pass {
      font-family: monospace;
      font-size: 11px;
      background: rgba(16,185,129,0.12);
      color: #065F46;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .use-cred-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      padding: 0 4px;
    }

    .use-cred-btn:hover { color: var(--primary-dark); }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">U</div>
      <div class="login-logo-text">
        <h1>UPAY NGO</h1>
        <p>Finance Portal · Nagpur, India</p>
      </div>
    </div>

    <h2 class="login-heading">Welcome Back 👋</h2>
    <p class="login-sub">Sign in to access your dashboard</p>

    <!-- Role Selector -->
    <div class="role-selector" id="role-selector">
      <label class="role-option">
        <input type="radio" name="role" value="Admin" id="role-admin" />
        <span class="role-label">
          <span class="role-emoji">🛡️</span>
          <span class="role-label-text">
            <strong>Admin</strong>
            <small>Full access</small>
          </span>
        </span>
      </label>
      <label class="role-option">
        <input type="radio" name="role" value="Volunteer" id="role-volunteer" checked />
        <span class="role-label">
          <span class="role-emoji">🤝</span>
          <span class="role-label-text">
            <strong>Volunteer</strong>
            <small>View & submit</small>
          </span>
        </span>
      </label>
    </div>

    <!-- Login Form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span>*</span></label>
        <input type="email" id="email" class="form-control" placeholder="e.g. admin@upay.org" autocomplete="email" />
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span>*</span></label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
        <div class="form-error" id="password-error"></div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        🔐 Sign In to Portal
      </button>

      <div class="login-error" id="login-error"></div>
    </form>

    <!-- Demo Credentials -->
    <div class="demo-creds">
      <h4>🧪 Demo Credentials</h4>
      <div class="cred-row">
        <span class="cred-role">Admin</span>
        <span class="cred-email">admin@upay.org</span>
        <span class="cred-pass">Admin@123</span>
        <button class="use-cred-btn" onclick="fillCreds('admin@upay.org','Admin@123','Admin')">Use</button>
      </div>
      <div class="cred-row">
        <span class="cred-role">Volunteer</span>
        <span class="cred-email">volunteer@upay.org</span>
        <span class="cred-pass">Vol@123</span>
        <button class="use-cred-btn" onclick="fillCreds('volunteer@upay.org','Vol@123','Volunteer')">Use</button>
      </div>
    </div>

    <div class="login-footer">
      Under Privileged Advancement by Youth &copy; 2026
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Init data on first load
    initData();

    // Redirect if already logged in
    const existingSession = localStorage.getItem('upay_session');
    if (existingSession) window.location.href = 'dashboard.html';

    function fillCreds(email, pass, role) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = pass;
      document.querySelector(`input[value="${role}"]`).checked = true;
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const emailEl    = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const errorEl    = document.getElementById('login-error');

      // Clear old errors
      document.getElementById('email-error').classList.remove('show');
      document.getElementById('password-error').classList.remove('show');
      emailEl.classList.remove('error');
      passwordEl.classList.remove('error');
      errorEl.classList.remove('show');

      const email    = emailEl.value.trim();
      const password = passwordEl.value.trim();
      const role     = document.querySelector('input[name="role"]:checked')?.value;

      let valid = true;

      if (!email) {
        document.getElementById('email-error').textContent = 'Email is required.';
        document.getElementById('email-error').classList.add('show');
        emailEl.classList.add('error');
        valid = false;
      } else if (!/^\S+@\S+\.\S+$/.test(email)) {
        document.getElementById('email-error').textContent = 'Please enter a valid email address.';
        document.getElementById('email-error').classList.add('show');
        emailEl.classList.add('error');
        valid = false;
      }

      if (!password) {
        document.getElementById('password-error').textContent = 'Password is required.';
        document.getElementById('password-error').classList.add('show');
        passwordEl.classList.add('error');
        valid = false;
      }

      if (!valid) return;

      const users = JSON.parse(localStorage.getItem('upay_users') || '[]');
      const user  = users.find(u =>
        u.email.toLowerCase() === email.toLowerCase() &&
        u.password === password &&
        u.role === role
      );

      if (!user) {
        errorEl.textContent = '❌ Invalid email, password, or role. Please check your credentials.';
        errorEl.classList.add('show');
        emailEl.classList.add('error');
        passwordEl.classList.add('error');
        return;
      }

      localStorage.setItem('upay_session', JSON.stringify(user));
      showToast('Login successful! Redirecting…', 'success', 1500);

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    });
  </script>
</body>
</html>
